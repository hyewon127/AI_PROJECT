<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 이미지 분석 서비스</title>
    <style>
        /* 다크 모드 기반 미니멀 디자인 */
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #bb86fc;
            --secondary-text: #b0b0b0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: var(--accent-color); }

        /* 업로드 섹션 */
        .upload-box {
            border: 2px dashed #333;
            padding: 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: border 0.3s;
            margin-bottom: 1rem;
        }
        .upload-box:hover { border-color: var(--accent-color); }

        #previewImg {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            display: none;
            margin-top: 10px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin: 1rem 0;
            background: #2c2c2c;
            border: 1px solid #444;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-color);
            border: none;
            border-radius: 8px;
            color: #121212;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        button:hover { opacity: 0.8; }
        button:disabled { background-color: #555; cursor: not-allowed; }

        /* 로딩 애니메이션 */
        .loading {
            display: none;
            margin-top: 1rem;
            font-size: 0.9rem;
            color: var(--accent-color);
        }
        .spinner {
            width: 20px; height: 20px;
            border: 3px solid rgba(187, 134, 252, 0.3);
            border-top: 3px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 결과 창 */
        #resultArea {
            margin-top: 1.5rem;
            padding: 15px;
            background: #2c2c2c;
            border-radius: 8px;
            text-align: left;
            display: none;
        }
        .result-label { font-size: 0.8rem; color: var(--secondary-text); margin-bottom: 5px; }
        .result-content { line-height: 1.6; }
    </style>
</head>
<body>

<div class="container">
    <h1>AI 이미지 분석기</h1>
    
    <div class="upload-box" onclick="document.getElementById('fileInput').click()">
        <p id="uploadText">이미지를 클릭하여 업로드하세요</p>
        <img id="previewImg" src="" alt="Preview">
    </div>
    <input type="file" id="fileInput" accept="image/*" style="display: none">

    <input type="text" id="questionInput" placeholder="이미지에 대해 궁금한 점을 입력하세요">
    
    <button id="analyzeBtn">분석하기</button>

    <div id="loading" class="loading">
        <div class="spinner"></div> AI가 분석 중입니다...
    </div>

    <div id="resultArea">
        <div class="result-label">분석 결과:</div>
        <div id="resultContent" class="result-content"></div>
    </div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const previewImg = document.getElementById('previewImg');
    const uploadText = document.getElementById('uploadText');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const resultArea = document.getElementById('resultArea');
    const resultContent = document.getElementById('resultContent');
    const loading = document.getElementById('loading');

    // 이미지 미리보기 로직
    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const url = URL.createObjectURL(file);
            previewImg.src = url;
            previewImg.style.display = 'block';
            uploadText.style.display = 'none';
        }
    });

    // 분석 요청 로직
    analyzeBtn.addEventListener('click', async () => {
        const file = fileInput.files[0];
        const question = document.getElementById('questionInput').value;

        if (!file || !question) {
            alert('이미지와 질문을 모두 입력해주세요!');
            return;
        }

        // UI 상태 업데이트
        analyzeBtn.disabled = true;
        loading.style.display = 'block';
        resultArea.style.display = 'none';

        const formData = new FormData();
        formData.append('image', file);
        formData.append('question', question);

        try {
            // Node.js 프록시 서버로 요청 전송
            const response = await fetch('/api/analyze', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();

            if (data.success) {
                resultContent.innerText = data.result;
                resultArea.style.display = 'block';
            } else {
                alert('에러 발생: ' + data.message);
            }
        } catch (err) {
            alert('서버 연결 실패');
        } finally {
            analyzeBtn.disabled = false;
            loading.style.display = 'none';
        }
    });
</script>

</body>
</html>
